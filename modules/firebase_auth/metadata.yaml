apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: firebase-auth
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Firebase Authentication
    source:
      repo: https://github.com/GoogleCloudPlatform/terraform-google-firebase.git
      sourceType: git
      dir: /modules/firebase_auth
    version: 0.1.2
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
    icon: assets/icon.png
  content:
    examples:
      - name: app_ai_storage
        location: examples/app_ai_storage
      - name: app_and_appcheck
        location: examples/app_and_appcheck
      - name: firebase_ai_logic
        location: examples/firebase_ai_logic
      - name: firebase_app_hosting
        location: examples/firebase_app_hosting
      - name: firebase_auth_suite
        location: examples/firebase_auth_suite
      - name: firebase_multi_platform_app
        location: examples/firebase_multi_platform_app
      - name: firestore_rules
        location: examples/firestore_rules
  interfaces:
    variables:
      - name: project_id
        description: The GCP project ID to initialize Firebase Auth in.
        varType: string
        required: true
        connections:
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-firebase//modules/firebase_app_check
              version: ">= 0.1.1"
            spec:
              outputExpr: project_id
          - source:
              source: github.com/terraform-google-modules/terraform-google-cloud-storage//modules/simple_bucket
              version: ">= 12.3.0"
            spec:
              outputExpr: project_id
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-cloud-functions
              version: ">= 0.8.0"
            spec:
              outputExpr: project_id
          - source:
              source: github.com/terraform-google-modules/terraform-google-kubernetes-engine//modules/gke-autopilot-cluster
              version: ">= 41.0.1"
            spec:
              outputExpr: project_id
          - source:
              source: github.com/terraform-google-modules/terraform-google-kubernetes-engine//modules/gke-standard-cluster
              version: ">= 43.0.0"
            spec:
              outputExpr: project_id
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-cloud-run//modules/v2
              version: ">= 0.25.0"
            spec:
              outputExpr: project_id
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-firebase//modules/firebase_ai_logic_prompt_template
              version: ">= 0.1.1"
            spec:
              outputExpr: project_id
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-firebase//modules/firebase_ai_logic_core
              version: ">= 0.1.1"
            spec:
              outputExpr: project_id
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-firebase//modules/firebase_multi_platform_application
              version: ">= 0.1.1"
            spec:
              outputExpr: project_id
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-firebase//modules/firestore_rules
              version: ">= 0.1.1"
            spec:
              outputExpr: project_id
      - name: enable_auth_management
        description: Allows skipping config creation.
        varType: bool
        defaultValue: true
      - name: auth_config
        description: Core configuration for Firebase Identity Platform.
        varType: |-
          object({
              allow_duplicate_emails  = optional(bool, false)
              anonymous_enabled       = optional(bool, false)
              email_enabled           = optional(bool, false)
              email_password_required = optional(bool, true)
              phone_enabled           = optional(bool, false)
              test_phone_numbers      = optional(map(string), {})
              authorized_domains      = optional(list(string), ["localhost"])
            })
        defaultValue: {}
      - name: auth_providers
        description: Authentication provider configurations.
        varType: |-
          object({
              google = optional(object({
                client_id     = string
                client_secret = string
              }))
              apple = optional(object({
                service_id    = string
                team_id       = string
                key_id        = string
                client_secret = string
              }))
              facebook = optional(object({
                app_id     = string
                app_secret = string
              }))
              github = optional(object({
                client_id     = string
                client_secret = string
              }))
            })
        defaultValue: {}
    outputs:
      - name: enabled_providers
        description: List of enabled authentication providers.
        type:
          - list
          - string
      - name: project_id
        description: The project ID.
        type: string
  requirements:
    roles:
      - level: Project
        roles:
          - roles/firebase.admin
          - roles/iam.serviceAccountAdmin
          - roles/serviceusage.serviceUsageAdmin
    services:
      - identitytoolkit.googleapis.com
      - serviceusage.googleapis.com
    providerVersions:
      - source: hashicorp/google-beta
        version: ">= 6.13.0"
