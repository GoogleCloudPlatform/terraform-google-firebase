apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: firebase-auth
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: Firebase Authentication
    source:
      repo: https://github.com/GoogleCloudPlatform/terraform-google-firebase.git
      sourceType: git
      dir: /modules/firebase_auth
    version: 0.3.0
    actuationTool:
      flavor: Terraform
      version: ">= 1.3"
    description: {}
    icon: assets/icon.png
  content:
    examples:
      - name: app_ai_storage
        location: examples/app_ai_storage
      - name: app_and_appcheck
        location: examples/app_and_appcheck
      - name: firebase_ai_logic
        location: examples/firebase_ai_logic
      - name: firebase_app_hosting
        location: examples/firebase_app_hosting
      - name: firebase_auth_suite
        location: examples/firebase_auth_suite
      - name: firebase_multi_platform_app
        location: examples/firebase_multi_platform_app
      - name: firestore_rules
        location: examples/firestore_rules
  interfaces:
    variables:
      - name: project_id
        description: The GCP project ID to initialize Firebase Auth in.
        varType: string
        required: true
        connections:
          - source:
              source: github.com/GoogleCloudPlatform/terraform-google-firebase//modules/firebase_multi_platform_application
              version: ">= 0.2.3"
            spec:
              outputExpr: project_id
      - name: enable_auth_management
        description: Whether Terraform should manage the base Identity Platform configuration. Set to false if the auth config is managed externally or via the Firebase Console.
        varType: bool
        defaultValue: true
      - name: auth_config
        description: Core configuration for Firebase Identity Platform.
        varType: |-
          object({
              allow_duplicate_emails  = optional(bool, false)
              anonymous_enabled       = optional(bool, false)
              email_enabled           = optional(bool, false)
              email_password_required = optional(bool, true)
              phone_enabled           = optional(bool, false)
              test_phone_numbers      = optional(map(string), {})
              authorized_domains      = optional(list(string), ["localhost"])
              sms_region_config = optional(object({
                allow_by_default = optional(object({
                  disallowed_regions = optional(list(string))
                }))
                allowlist = optional(object({
                  allowed_regions = optional(list(string))
                }))
              }))
            })
        defaultValue: {}
      - name: auth_providers
        description: Authentication provider configurations.
        varType: |-
          object({
              google = optional(object({
                client_id     = string
                client_secret = string
              }))
              apple = optional(object({
                service_id    = string
                team_id       = string
                key_id        = string
                client_secret = string
              }))
              facebook = optional(object({
                app_id     = string
                app_secret = string
              }))
              github = optional(object({
                client_id     = string
                client_secret = string
              }))
            })
        defaultValue: {}
      - name: autodelete_anonymous_users
        description: Whether to auto-delete anonymous users.
        varType: bool
        defaultValue: true
      - name: blocking_functions
        description: Configuration related to blocking functions.
        varType: |-
          object({
              triggers = optional(list(object({
                event_type   = string
                function_uri = string
              })))
              forward_inbound_credentials = optional(object({
                id_token      = optional(bool)
                access_token  = optional(bool)
                refresh_token = optional(bool)
              }))
            })
      - name: quota
        description: Configuration related to quotas.
        varType: |-
          object({
              sign_up_quota_config = optional(object({
                quota          = optional(number)
                start_time     = optional(string)
                quota_duration = optional(string)
              }))
            })
      - name: mfa
        description: Options related to Multi-Factor Authentication (MFA).
        varType: |-
          object({
              state = optional(string) # DISABLED, ENABLED, MANDATORY
              provider_configs = optional(list(object({
                state = optional(string)
                totp_provider_config = optional(object({
                  adjacent_intervals = optional(number)
                }))
              })))
            })
      - name: multi_tenant
        description: Configuration related to multi-tenant functionality.
        varType: |-
          object({
              allow_tenant_creation   = optional(bool)
              default_tenant_location = optional(string)
            })
      - name: monitoring
        description: Configuration related to monitoring project activity.
        varType: |-
          object({
              request_logging_enabled = optional(bool)
            })
    outputs:
      - name: enabled_providers
        description: List of enabled authentication providers.
        type:
          - list
          - string
      - name: project_id
        description: The project ID.
  requirements:
    roles:
      - level: Project
        roles:
          - roles/firebase.admin
          - roles/iam.serviceAccountAdmin
          - roles/serviceusage.serviceUsageAdmin
    services:
      - firebasehosting.googleapis.com
      - identitytoolkit.googleapis.com
      - serviceusage.googleapis.com
    providerVersions:
      - source: hashicorp/google-beta
        version: ">= 6.13.0"
